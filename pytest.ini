[pytest]
# Include both rootdir and tests/: root has test_al_mizan.py (unittest-style,
# class AlMizanTests — 30 tests, predates tests/ subdir), tests/ has
# test_al_mizan.py (pytest-style, Test* classes — 9 tests). The tests/__init__.py
# sibling file makes tests/ a package, giving the subdir-copy the fully-qualified
# module name `tests.test_al_mizan` which prevents the module-name collision
# that previously hid the 30 root tests from default pytest collection.
testpaths = . tests
cache_dir = .pytest_cache
addopts = --basetemp=.pytest_tmp
